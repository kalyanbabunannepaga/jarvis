# Sonar project configuration for Jarvis AI Coding Assistant
# Run: ./gradlew sonar -Dsonar.token=<your-token>

sonar.projectKey=kalyanbabunannepaga_jarvis
sonar.projectName=Jarvis
sonar.projectVersion=1.0.0

# Source / test paths
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=build/classes/java/main
sonar.java.test.binaries=build/classes/java/test

# Coverage report (generated by JaCoCo — add jacoco plugin to build.gradle to enable)
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# Exclusions: intentional terminal UI and CLI entry-point are hard to unit-test
# and are excluded from coverage measurement only (not from issue scanning)
sonar.coverage.exclusions=\
  **/ui/TerminalUI.java,\
  **/Jarvis.java

# CPD exclusions: provider classes share structure by design (same API protocol pattern)
sonar.cpd.exclusions=**/llm/*Provider.java

# Encoding
sonar.sourceEncoding=UTF-8
